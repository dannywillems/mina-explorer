name: Delete PR Docker image

# When a PR closes (merged or not), delete its `pr-<number>` tag from
# ghcr.io/o1-labs/mina-explorer so the registry doesn't accumulate stale
# tags. Idempotent — exits cleanly if no such tag exists (e.g., the PR
# never touched docker-relevant files and never had an image built).

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    name: Delete pr-<number> tag from GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Fork PRs never had an image pushed (the build job in docker.yml skips
    # them), so there's nothing to clean up.
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Delete pr-${{ github.event.pull_request.number }} tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PACKAGE=mina-explorer
          TAG="pr-${PR_NUMBER}"
          echo "Looking up versions tagged ${TAG} in ${OWNER}/${PACKAGE}"

          # List versions and find any that carry the pr-<number> tag.
          # GHCR /versions returns one entry per immutable image manifest;
          # an entry's metadata.container.tags array contains the human-
          # readable tags currently pointing at it.
          VERSION_IDS=$(gh api \
            "/orgs/${OWNER}/packages/container/${PACKAGE}/versions" \
            --paginate \
            --jq ".[] | select(.metadata.container.tags // [] | index(\"${TAG}\")) | .id" \
            || true)

          if [ -z "$VERSION_IDS" ]; then
            echo "No versions tagged ${TAG} found, nothing to delete"
            exit 0
          fi

          # GHCR refuses to delete a version via the per-version DELETE
          # endpoint if it would leave the package with zero tagged versions
          # (HTTP 400: "You cannot delete the last tagged version of a
          # package. You must delete the package instead."). This bites the
          # very first PR cleanup when no release tags exist yet. We detect
          # that specific error and skip cleanly — the orphaned pr-<n> tag
          # becomes deletable as soon as any other tagged version exists.
          for ID in $VERSION_IDS; do
            echo "Deleting version ${ID} (was tagged ${TAG})"
            if OUTPUT=$(gh api -X DELETE \
              "/orgs/${OWNER}/packages/container/${PACKAGE}/versions/${ID}" 2>&1); then
              echo "  deleted"
            else
              if printf '%s' "$OUTPUT" | grep -q "last tagged version"; then
                echo "  warning: ${TAG} is the only tagged version of ${PACKAGE} — skipping deletion."
                echo "  The orphaned tag will become deletable once another release or PR pushes a new tag."
                continue
              fi
              echo "  error: failed to delete version ${ID}" >&2
              printf '%s\n' "$OUTPUT" >&2
              exit 1
            fi
          done
